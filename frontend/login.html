{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block css %}

<style>

    .auth-wrap {
        min-height: calc(100vh - 260px);
        display: flex;
        align-items: center;
        padding: 40px 0;
    }

    .auth-card {
        padding: 44px 40px;
        animation: fadeInUp .5s var(--ease) both;
    }

    .auth-logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: var(--accent-dim);
        border: 1px solid rgba(245, 200, 76, .3);
        color: var(--accent);
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 22px;
    }

    .auth-title {
        text-align: center;
        font-size: 1.55rem;
        margin-bottom: 6px;
    }

    .auth-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: .9rem;
        margin-bottom: 30px;
    }

    .auth-card .form-control {
        padding: .78rem 1rem;
    }

    .auth-card .btn-primary {
        padding: .78rem 1rem;
        font-size: .95rem;
        margin-top: 6px;
    }

    .auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 26px 0;
        color: var(--text-muted);
        font-size: .78rem;
    }

    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    .auth-card p.text-center a {
        color: var(--accent);
        font-weight: 600;
        transition: opacity .25s var(--ease);
    }

    .auth-card p.text-center a:hover {
        opacity: .8;
    }

    .btn-loading {
        pointer-events: none;
        opacity: .75;
    }

    /* Toast notifications */

    #toastContainer {
        z-index: 1080;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        pointer-events: none;
    }

    .site-toast {
        pointer-events: auto;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        width: 320px;
        max-width: calc(100vw - 40px);
        padding: 14px 16px;
        border-radius: var(--radius-sm, 10px);
        background: #1c1c20;
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        box-shadow: 0 14px 32px -8px rgba(0, 0, 0, .55);
        animation: toastIn .3s var(--ease, ease) both;
    }

    .site-toast.hiding {
        animation: toastOut .22s var(--ease, ease) both;
    }

    .site-toast.success {
        border-left-color: #4ecb8d;
    }

    .site-toast.danger {
        border-left-color: #ef5b6a;
    }

    .site-toast .toast-icon {
        flex-shrink: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .95rem;
        margin-top: 1px;
    }

    .site-toast.success .toast-icon {
        background: rgba(78, 203, 141, .15);
        color: #4ecb8d;
    }

    .site-toast.danger .toast-icon {
        background: rgba(239, 91, 106, .15);
        color: #ef5b6a;
    }

    .site-toast .toast-message {
        flex: 1;
        font-size: .87rem;
        line-height: 1.4;
        color: var(--text-secondary, #e6e6e6);
        padding-top: 3px;
    }

    .site-toast .toast-close {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1;
        padding: 2px;
        cursor: pointer;
        flex-shrink: 0;
    }

    .site-toast .toast-close:hover {
        color: var(--text-secondary, #e6e6e6);
    }

    @keyframes toastIn {
        from { transform: translateX(24px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes toastOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(24px); opacity: 0; }
    }

</style>

{% endblock %}

{% block content %}

<!-- Toast notifications -->
<div id="toastContainer" class="position-fixed top-0 end-0 p-3"></div>

<div class="auth-wrap">

    <div class="row justify-content-center w-100">

        <div class="col-md-5">

            <div class="card auth-card">

                <div class="auth-logo">
                    <i class="bi bi-stars"></i>
                </div>

                <h2 class="auth-title fw-bold">
                    Welcome Back
                </h2>

                <p class="auth-subtitle">
                    Log in to keep discovering and hosting great events.
                </p>

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="username"
                        class="form-control"
                        placeholder="you@example.com"
                        autocomplete="email">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter your password"
                        autocomplete="current-password">

                </div>

                <button
                    id="loginBtn"
                    class="btn btn-primary w-100"
                    onclick="login()">

                    Login

                </button>

                <div class="auth-divider">or</div>

                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="/register/">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block js %}

<script>

// Site-styled toast notifications, shown top-right.
function showToast(message,type="success"){

    const container=document.getElementById("toastContainer");

    if(!container){

        return;

    }

    const icon=(type==="success") ? "bi-check-circle-fill" : "bi-exclamation-circle-fill";

    const toastEl=document.createElement("div");

    toastEl.className=`site-toast ${type}`;

    toastEl.innerHTML=`
        <div class="toast-icon"><i class="bi ${icon}"></i></div>
        <div class="toast-message">${message}</div>
        <button type="button" class="toast-close" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    `;

    container.appendChild(toastEl);

    let dismissTimer;

    function dismiss(){

        clearTimeout(dismissTimer);

        toastEl.classList.add("hiding");

        toastEl.addEventListener("animationend",()=>toastEl.remove(),{once:true});

    }

    toastEl.querySelector(".toast-close").addEventListener("click",dismiss);

    dismissTimer=setTimeout(dismiss,4000);

}

async function login(){

    const username=document.getElementById("username").value.trim();

    const password=document.getElementById("password").value;

    const btn=document.getElementById("loginBtn");

    if(username==="" || password===""){

        showToast("Please fill all fields.","danger");

        return;

    }

    btn.classList.add("btn-loading");

    btn.textContent="Logging in...";

    try{

        const response=await fetch(API_BASE+"/accounts/login/",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email:username,

                password:password

            })

        });

        const data=await response.json();

        if(response.ok){

            localStorage.setItem("access",data.token);

            localStorage.setItem("user",JSON.stringify(data.user || {}));

            showToast("Login successful!","success");

            setTimeout(()=>{

                window.location="/";

            },800);

        }

        else{

            showToast(data.error || data.detail || "Invalid credentials.","danger");

            btn.classList.remove("btn-loading");

            btn.textContent="Login";

        }

    }

    catch(error){

        showToast("Server error. Please try again.","danger");

        btn.classList.remove("btn-loading");

        btn.textContent="Login";

    }

}

</script>

{% endblock %}
